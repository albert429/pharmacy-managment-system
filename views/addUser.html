<div class="d-flex justify-content-center py-4">
  <div class="auth-card">

    <div class="text-center mb-4">
      <img src="assets/Transparent-logo.png" alt="CureVia" class="auth-logo" />
      <h4 class="auth-title mb-1">Add New User</h4>
      <p class="text-muted small mb-0">Admin or Cashier account</p>
    </div>

    <form name="addUserForm" ng-submit="addUser()" novalidate>

      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="fullName" class="form-control" placeholder="Enter your name"
                 ng-model="user.fullName" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addUserForm.fullName.$touched && addUserForm.fullName.$invalid">
          Full name is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter your email"
                 ng-model="user.email" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addUserForm.email.$touched && addUserForm.email.$invalid">
          Valid email is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Create password"
                 ng-model="user.password" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addUserForm.password.$touched && addUserForm.password.$invalid">
          Password is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="tel" name="phone" class="form-control" placeholder="Enter phone number"
                 ng-model="user.phone" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addUserForm.phone.$touched && addUserForm.phone.$invalid">
          Phone number is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Role</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
          <select name="role" class="form-select" ng-model="user.role" required>
            <option value="" disabled>Select role</option>
            <option value="admin">Admin</option>
            <option value="cashier">Cashier</option>
          </select>
        </div>
        <div class="text-danger small mt-1" ng-show="addUserForm.role.$touched && !user.role">
          Role is required.
        </div>
      </div>

      <button type="submit" class="auth-btn btn mt-1" ng-disabled="addUserForm.$invalid || !user.role">
        Add User
      </button>

      <div class="alert alert-danger mt-3 small mb-0" ng-if="addUserError">
        <i class="bi bi-exclamation-circle me-1"></i>{{ addUserError }}
      </div>

      <div class="alert alert-success mt-3 small mb-0" ng-if="addUserSuccess">
        <i class="bi bi-check-circle me-1"></i>User created successfully!
      </div>

    </form>
  </div>
</div>
