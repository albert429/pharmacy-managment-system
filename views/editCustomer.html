<div class="container">
  <div class="card signup-card p-4">

    <div class="text-center mb-4">
      <div class="logo">Edit Customer</div>
      <p class="text-muted">Update customer information</p>
    </div>

    <form name="editCustomerForm" ng-submit="editCustomer()" novalidate>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="name" class="form-control" placeholder="Enter full name"
                 ng-model="customer.name" required>
        </div>
        <div class="text-danger" ng-show="editCustomerForm.name.$touched && editCustomerForm.name.$invalid">
          Full name is required.
        </div>
      </div>
     
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter email"
                 ng-model="customer.email" required>
        </div>
        <div class="text-danger" ng-show="editCustomerForm.email.$touched && editCustomerForm.email.$invalid">
          Valid email is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="tel" name="phone" class="form-control" placeholder="Enter phone number"
                 ng-model="customer.phone" required>
        </div>
        <div class="text-danger" ng-show="editCustomerForm.phone.$touched && editCustomerForm.phone.$invalid">
          Phone number is required.
        </div>
      </div>

      <button type="submit" class="btn btn-custom w-100 mt-2"
              ng-disabled="editCustomerForm.$invalid">
        Update Customer
      </button>

    </form>
  </div>

</div>
