<!-- Stat Cards -->
<div class="row g-3 mb-4">
  <div class="col-6 col-md-4">
    <div class="card border-0 shadow-sm stat-card h-100">
      <div class="card-body py-3">
        <p class="text-muted mb-1 small fw-bold text-uppercase">Medicines</p>
        <h3 class="fw-bold mb-0" style="color: var(--brand-primary)">{{ stats.medicines }}</h3>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-4">
    <div class="card border-0 shadow-sm stat-card h-100" style="border-left-color: var(--success) !important">
      <div class="card-body py-3">
        <p class="text-muted mb-1 small fw-bold text-uppercase">Customers</p>
        <h3 class="fw-bold mb-0" style="color: var(--success)">{{ stats.customers }}</h3>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-4">
    <div class="card border-0 shadow-sm stat-card h-100" style="border-left-color: var(--warning) !important">
      <div class="card-body py-3">
        <p class="text-muted mb-1 small fw-bold text-uppercase">Invoices</p>
        <h3 class="fw-bold mb-0" style="color: var(--warning)">{{ stats.invoices }}</h3>
      </div>
    </div>
  </div>
</div>

<!-- Recent Medicines -->
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h5 class="card-title fw-bold mb-3">
      <i class="bi bi-capsule me-2" style="color: var(--brand-primary)"></i>Recent Medicines
    </h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th class="d-none d-sm-table-cell">Type</th>
            <th>Quantity</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="med in recentMedicines">
            <td class="text-muted fw-semibold">{{ med.medicine_id }}</td>
            <td class="fw-medium">{{ med.name }}</td>
            <td class="text-muted d-none d-sm-table-cell">{{ med.type }}</td>
            <td><span class="badge-units">{{ med.quantity }} units</span></td>
          </tr>
          <tr ng-if="recentMedicines.length === 0">
            <td colspan="4" class="text-center text-muted py-4">No medicines yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
