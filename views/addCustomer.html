
<div class="container">

<div class="card signup-card p-4">

<div class="text-center mb-4">
<div class="logo">Add New Customer</div>
<p class="text-muted">Add a new customer to the system</p>
</div>

<form name="addCustomerForm" ng-submit="addCustomer()" novalidate>

  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" name="fullName" class="form-control" placeholder="Enter your name" 
             ng-model="customer.fullName" required>
    </div>
    <div class="text-danger" ng-show="addCustomerForm.fullName.$touched && addCustomerForm.fullName.$invalid">
      Full name is required.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Email Address</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" name="email" class="form-control" placeholder="Enter your email"
             ng-model="customer.email" required>
    </div>
    <div class="text-danger" ng-show="addCustomerForm.email.$touched && addCustomerForm.email.$invalid">
      Valid email is required.
    </div>
  </div>

    <div class="mb-3">
    <label class="form-label">Phone Number</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-telephone"></i></span>
      <input type="tel" name="phone" class="form-control" placeholder="Enter phone number"
             ng-model="customer.phone" required>
    </div>
    <div class="text-danger" ng-show="addCustomerForm.phone.$touched && addCustomerForm.phone.$invalid">
      Phone number is required.
    </div>
  </div>

<div ng-if="statusMessage" class="mt-3">
  <div ng-class="{'alert alert-success': statusType === 'success', 
                  'alert alert-danger': statusType === 'error'}">
    {{ statusMessage }}
  </div>
</div> 

  <button type="submit" class="btn btn-custom w-100 mt-2" 
          ng-disabled="addCustomerForm.$invalid">
    Add Customer
  </button>

</form>
</div>

</div>
