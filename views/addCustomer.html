<!-- Page Header -->
<div class="d-flex align-items-center justify-content-between mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-person-plus me-2"></i>Add Customer</h4>
  <button class="btn btn-sm btn-outline-secondary" ng-click="goToCustomers()">
    <i class="bi bi-arrow-left me-1"></i>Back
  </button>
</div>

<div class="card border-0 shadow-sm" style="max-width: 560px">
  <div class="card-body p-4">
    <form name="addCustomerForm" ng-submit="addCustomer()" novalidate>

      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="fullName" class="form-control" placeholder="Enter full name"
                 ng-model="customer.fullName" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addCustomerForm.fullName.$touched && addCustomerForm.fullName.$invalid">
          Full name is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter email"
                 ng-model="customer.email" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addCustomerForm.email.$touched && addCustomerForm.email.$invalid">
          Valid email is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="tel" name="phone" class="form-control" placeholder="Enter phone number"
                 ng-model="customer.phone" required>
        </div>
        <div class="text-danger small mt-1" ng-show="addCustomerForm.phone.$touched && addCustomerForm.phone.$invalid">
          Phone number is required.
        </div>
      </div>

      <div class="alert alert-danger small mb-3" ng-if="statusType === 'error'">
        <i class="bi bi-exclamation-circle me-1"></i>{{ statusMessage }}
      </div>

      <button type="submit" class="btn w-100 text-white" style="background: var(--brand-primary)"
              ng-disabled="addCustomerForm.$invalid">
        Add Customer
      </button>

    </form>
  </div>
</div>
