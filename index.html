<!doctype html>
<html lang="en" ng-app="pharmacyApp">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CureVia — Pharmacy Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script src="Service/authService.js"></script>
  <script src="Service/dataService.js"></script>
  <script src="controller/medicineController.js"></script>
  <script src="controller/dashboardController.js"></script>

  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <!-- ── Sidebar ────────────────────────────────── -->
  <div class="offcanvas offcanvas-start d-flex flex-column" id="sidebar" tabindex="-1">
    <div class="p-3 d-flex align-items-center justify-content-between">
      <div class="sidebar-brand">
        <img src="assets/Transparent-logo.png" alt="CureVia" height="36" />
        <span class="sidebar-brand-text">CureVia</span>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="px-3 pt-2 pb-3">
      <span class="d-block sidebar-user-name">Albert</span>
      <span class="d-block sidebar-user-role">Admin</span>
    </div>

    <hr style="border-color: rgba(255,255,255,.08); margin: 0;" />

    <nav class="flex-grow-1 py-2">
      <a href="#!/" class="sidebar-link active"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      <a href="#!/medicines" class="sidebar-link"><i class="bi bi-capsule"></i> Medicines</a>
      <a href="#" class="sidebar-link"><i class="bi bi-people-fill"></i> Customers</a>
      <a href="#" class="sidebar-link"><i class="bi bi-receipt"></i> Invoices</a>
      <a href="#" class="sidebar-link"><i class="bi bi-person-gear"></i> Users</a>
    </nav>

    <div class="p-3">
      <a href="login.html" class="btn-logout">
        <i class="bi bi-box-arrow-left me-1"></i>Logout
      </a>
    </div>
  </div>

  <!-- ── Top Bar ────────────────────────────────── -->
  <nav class="navbar">
    <button class="btn p-0 me-3 border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
      <i class="bi bi-list fs-4 text-white"></i>
    </button>

    <span class="navbar-page-title">Dashboard</span>

    <span class="ms-auto navbar-date" id="navbar-date">
      <i class="bi bi-calendar3 me-1"></i>
    </span>
  </nav>

  <!-- ── Page Content ───────────────────────────── -->
  <div class="dashboard-container">
    <ng-view></ng-view>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Set today's date in navbar
    (function () {
      var d = new Date();
      var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      document.getElementById('navbar-date').insertAdjacentText('beforeend',
        days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear()
      );
    })();

    // Update active sidebar link on hash change
    window.addEventListener('hashchange', function () {
      var links = document.querySelectorAll('.sidebar-link');
      links.forEach(function (link) {
        link.classList.remove('active');
        if (link.getAttribute('href') === location.hash) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>

</html>
