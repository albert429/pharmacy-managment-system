<!doctype html>
<html lang="en" ng-app="pharmacyApp">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CureVia — Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="app.js"></script>
  <script src="Service/authService.js"></script>
  <script src="Service/dataService.js"></script>
  <script src="controller/medicineController.js"></script>
  <script src="controller/customerController.js"></script>
  <script src="Directives/userTableDirective.js"></script>
  <script src="controller/userController.js"></script>
  <script src="controller/authController.js"></script>


  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div class="offcanvas offcanvas-start d-flex flex-column" id="sidebar" tabindex="-1">
    <div class="p-3 d-flex align-items-center justify-content-between">
      <img src="assets/logo.jpg" alt="CureVia" height="34" />
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="p-3">
      <span class="d-block text-white fw-semibold" style="font-size: 0.88rem">Ziyad Al-Awadhi</span>
      <span class="d-block text-secondary" style="font-size: 0.7rem">Admin</span>
    </div>

    <nav class="flex-grow-1 py-2">
      <a href="#!/" class="sidebar-link active"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="#!/medicines" class="sidebar-link"><i class="bi bi-capsule"></i> Medicines</a>
      <a href="#!/customers" class="sidebar-link"><i class="bi bi-people"></i> Customers</a>
      <a href="#" class="sidebar-link"><i class="bi bi-receipt"></i> Invoices</a>
      <a href="#!/users" class="sidebar-link"><i class="bi bi-gear"></i> Users</a>
      <a href="#!/add-user" class="sidebar-link"><i class="bi bi-person-plus"></i> Add User</a>
    </nav>

    <div class="p-3">
      <a href="#!/login" class="btn-logout">
        <i class="bi bi-box-arrow-left me-1"></i>Logout
      </a>
    </div>
  </div>

  <nav class="navbar px-3">
    <button class="btn p-0 me-3 border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
      <i class="bi bi-list fs-4 text-white"></i>
    </button>

    <span class="fw-bold" style="color: white; font-size: 1.2rem">Dashboard</span>

    <span class="ms-auto text-white small d-block">
      <i class="bi bi-calendar3 me-2"></i>Wednesday, March 4, 2026
    </span>
  </nav>

  <div class="mt-3 p-3 p-lg-4 m-auto" style="max-width: 1200px">
    <ng-view></ng-view>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
